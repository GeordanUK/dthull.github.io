<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Double Tap – Coming Soon</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0f1113; /* obsidian */
      color: #f2f2f2;
    }

    .container {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1rem;
    }

    .logo-wrapper {
      position: relative;
      margin-bottom: 1.5rem;
    }

    /* Soft glow */
    .logo-wrapper::before {
      content: "";
      position: absolute;
      inset: -30px;
      background: radial-gradient(
        circle,
        rgba(64, 180, 160, 0.35) 0%,
        rgba(64, 180, 160, 0.15) 35%,
        rgba(64, 180, 160, 0.05) 55%,
        transparent 70%
      );
      filter: blur(20px);
      z-index: 0;
    }

    img {
      position: relative;
      z-index: 1;
      max-width: 3200px;
      width: 100%;
      height: auto;
    }

    p {
      font-size: 1.1rem;
      letter-spacing: 0.04em;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrapper">
      <img src="double-tap-logo.png" alt="Double Tap Video Game Taproom Logo" />
    </div>
    <p>Something new is coming to Hull soon</p>
  </div>
</body>
</html>
